var currentLesson = 0;

function buildHome() {
  var list = document.getElementById('lessonsList');
  var html = '';
  for (var i = 0; i < lessons.length; i++) {
    var l = lessons[i];
    html += '<div class="lesson-card" onclick="showLesson(' + i + ')" style="border-right:3px solid ' + l.color + '">' +
      '<div class="lc-icon">' + l.icon + '</div>' +
      '<div class="lc-info">' +
        '<div class="lc-num" style="color:' + l.color + '">' + l.number + '</div>' +
        '<div class="lc-title">' + l.title + '</div>' +
        '<div class="lc-sub">' + l.subtitle + '</div>' +
      '</div>' +
      '<div class="lc-arrow">‹</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

function showLesson(i) {
  currentLesson = i;
  var l = lessons[i];
  document.getElementById('home').style.display = 'none';
  document.getElementById('lesson').style.display = 'block';
  window.scrollTo(0, 0);

  var header = document.getElementById('lessonHeader');
  header.style.borderRight = '4px solid ' + l.color;
  header.innerHTML = '<div class="l-eyebrow" style="color:' + l.color + '">' + l.number + ' · ' + l.icon + '</div>' +
    '<h2>' + l.title + '</h2>' +
    '<div class="l-sub">' + l.subtitle + '</div>';

  var tabsBar = document.getElementById('tabsBar');
  tabsBar.innerHTML =
    '<button class="tab-btn active" id="tabBtnAbout" style="border-bottom-color:' + l.color + '" onclick="switchTab(\'About\')">' + 'על השיעור' + '</button>' +
    '<button class="tab-btn" id="tabBtnVideos" onclick="switchTab(\'Videos\')">' + 'סרטונים (' + l.videos.length + ')' + '</button>' +
    '<button class="tab-btn" id="tabBtnCase" onclick="switchTab(\'Case\')">' + 'מקרה מבחן' + '</button>';

  var topicsHtml = '';
  for (var t = 0; t < l.keyTopics.length; t++) {
    topicsHtml += '<div class="topic-item"><span style="color:' + l.color + ';flex-shrink:0">▸</span><span>' + l.keyTopics[t] + '</span></div>';
  }
  document.getElementById('tabAbout').innerHTML =
    '<p class="desc">' + l.description + '</p>' +
    '<div class="topics-box">' +
      '<div class="box-title" style="color:' + l.color + '">נושאים מרכזיים</div>' +
      topicsHtml +
    '</div>';

  var vidsHtml = '<div class="vid-hint">📺 הסרטונים מוצגים כאן ישירות — כתוביות בעברית מופעלות אוטומטית כאשר זמינות</div>';
  for (var v = 0; v < l.videos.length; v++) {
    var vid = l.videos[v];
    var ytId = vid.url.split('v=')[1];
    var embedUrl = 'https://www.youtube.com/embed/' + ytId + '?cc_load_policy=1&cc_lang_pref=iw&hl=iw&rel=0&modestbranding=1';
    vidsHtml +=
      '<div class="vid-embed-card">' +
        '<div class="vid-embed-header">' +
          '<div class="vid-embed-title">' + vid.title + '</div>' +
          '<div class="vid-embed-meta"><span>⏱ ' + vid.duration + '</span><span>' + vid.lang + '</span></div>' +
        '</div>' +
        '<iframe class="vid-iframe" src="' + embedUrl + '" allowfullscreen loading="lazy" title="' + vid.title + '"></iframe>' +
        '<div class="vid-summary">' + vid.summary + '</div>' +
      '</div>';
  }
  document.getElementById('tabVideos').innerHTML = vidsHtml;

  document.getElementById('tabCase').innerHTML =
    '<div class="case-box" style="background:' + l.color + '11;border:1px solid ' + l.color + '33">' +
      '<div class="case-label" style="color:' + l.color + '">מקרה מבחן לשיעור זה</div>' +
      '<div class="case-text">' + l.caseStudy + '</div>' +
    '</div>' +
    '<div class="questions-box">' +
      '<div class="q-label">שאלות לחשיבה</div>' +
      '<div class="q-item">מה היו הגורמים שאיפשרו את הפשע?</div>' +
      '<div class="q-item">היכן נכשלה מערכת האכיפה?</div>' +
      '<div class="q-item">מה השתנה לאחר פרשה זו?</div>' +
    '</div>';

  switchTab('About');

  document.getElementById('prevBtn').disabled = (i === 0);
  document.getElementById('nextBtn').style.background = l.color;
  document.getElementById('nextBtn').disabled = (i === lessons.length - 1);
}

function switchTab(name) {
  var tabs = ['About', 'Videos', 'Case'];
  var color = lessons[currentLesson].color;
  for (var i = 0; i < tabs.length; i++) {
    var panel = document.getElementById('tab' + tabs[i]);
    var btn = document.getElementById('tabBtn' + tabs[i]);
    if (tabs[i] === name) {
      panel.classList.add('active');
      btn.classList.add('active');
      btn.style.borderBottomColor = color;
    } else {
      panel.classList.remove('active');
      btn.classList.remove('active');
      btn.style.borderBottomColor = 'transparent';
    }
  }
}

function showHome() {
  document.getElementById('lesson').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  window.scrollTo(0, 0);
}

function navigate(dir) {
  var next = currentLesson + dir;
  if (next >= 0 && next < lessons.length) showLesson(next);
}

buildHome();
</script>
